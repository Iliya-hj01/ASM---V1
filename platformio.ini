; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ATmega32]
platform = atmelavr
board = ATmega32
framework = arduino

# Upload via USBasp (ISP)
upload_protocol = usbasp
upload_flags =
  -Pusb
  -B4
  -e

board_build.f_cpu = 16000000L

# Serial monitor
monitor_speed = 9600

# Fuses: ext 16MHz crystal, BOD 2.7V, no bootloader, EEPROM retained
board_fuses.lfuse = 0xBF
board_fuses.hfuse = 0xC3

# Bootloader: Optiboot for ATmega32, UART0, 115200 baud, 16MHz
board_bootloader.file = bootloaders/optiboot_flash/bootloaders/atmega32/16000000L/optiboot_flash_atmega32_UART0_115200_16000000L_B0.hex
